<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>필즈 더 클래식 선발 대비 | 지필드 영재교육</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#02050b;--navy:#0d1b2a;--navy2:#0f1c2c;--gold:#d4af37;--gold-light:#f8dd83;--gold-glow:rgba(212,175,55,.35);--white:#f0ece2;--dim:#8a8a8a}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--white)}
.scene{position:fixed;inset:0;display:grid;place-items:center;text-align:center;padding:calc(28px + env(safe-area-inset-top)) 24px 28px;opacity:0;transform:translateY(26px) scale(.975);filter:blur(10px);transition:opacity .82s ease,transform .82s cubic-bezier(.16,1,.3,1),filter .82s ease;pointer-events:none;z-index:1}
.scene.on{opacity:1;transform:none;filter:none;pointer-events:auto;z-index:10}
#s0 .logo{width:120px;height:auto;border-radius:16px;object-fit:contain;margin-bottom:24px;filter:drop-shadow(0 0 20px var(--gold-glow));animation:logoPulse 2s ease-in-out infinite}
</style>
</head>
<body>test</body>
</html>
