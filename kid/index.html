<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>지필드 영재교육 · 학습 미리보기</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ink:#16221c;
    --paper:#0f1410;
    --brass:#EAC996;
    --brass-deep:#c9a878;
    --green:#1f5c4a;
    --kakao:#FEE500;
    --kakao-ink:#3c1e1e;
    --shadow:0 18px 50px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Pretendard',system-ui,sans-serif;
    background:
      radial-gradient(1000px 500px at 50% -5%, #1c2a22 0%, transparent 60%),
      linear-gradient(180deg,#0e1411 0%,#0a0d0b 100%);
    color:var(--brass);
    min-height:100%;
    overflow-x:hidden;
  }

  /* ===== Library (shelf) ===== */
  .lib{max-width:680px;margin:0 auto;padding:34px 20px 120px;text-align:center;}
  .lib-brand{
    font-size:13px;font-weight:700;letter-spacing:.22em;color:var(--brass-deep);
    margin-bottom:8px;
  }
  .lib-title{
    font-size:clamp(26px,7vw,38px);font-weight:900;letter-spacing:-.02em;
    color:#fff;margin-bottom:6px;
  }
  .lib-title b{color:var(--brass);}
  .lib-sub{font-size:14.5px;color:var(--brass-deep);margin-bottom:30px;line-height:1.6;}

  .shelf{
    display:grid;grid-template-columns:repeat(2,1fr);gap:26px 30px;
    perspective:1000px;max-width:440px;margin:0 auto;
  }
  @media(max-width:520px){.shelf{gap:13px;}}
  .shelf{perspective:1600px;}
  .book{
    cursor:pointer;border:none;background:none;padding:0;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    transition:transform .35s cubic-bezier(.22,1,.36,1);
  }
  .book .cover{
    position:relative;width:88%;aspect-ratio:1240/1755;
    transform-style:preserve-3d;
    transform:rotateY(-30deg);
    transition:transform .5s cubic-bezier(.22,1,.36,1);
    border-radius:3px 6px 6px 3px;
    box-shadow:14px 22px 40px rgba(0,0,0,.55);
  }
  /* 표지 앞면 */
  .book .cover img{
    width:100%;height:100%;object-fit:cover;display:block;
    border-radius:3px 6px 6px 3px;
    border:1px solid rgba(234,201,150,.22);
    border-left:none;
    position:relative;z-index:2;
    backface-visibility:hidden;
  }
  /* 책등 (왼쪽 두께면) */
  .book .cover::before{
    content:"";position:absolute;left:0;top:0;height:100%;width:26px;
    transform:translateX(-100%) rotateY(-90deg);
    transform-origin:right center;
    background:linear-gradient(90deg,#0d0a06,#2e2316 55%,#4a3820);
    border-radius:3px 0 0 3px;
    z-index:1;
  }
  /* 위/아래 페이지 그림자 느낌 (오른쪽 단면) */
  .book .cover::after{
    content:"";position:absolute;right:0;top:1%;height:98%;width:12px;
    transform:translateX(100%) rotateY(90deg);
    transform-origin:left center;
    background:repeating-linear-gradient(0deg,#efe4cd 0,#efe4cd 1.5px,#cdbf9f 3px);
    z-index:1;
  }
  .book:hover .cover,.book:focus-visible .cover{
    transform:rotateY(-12deg) translateY(-8px);
    box-shadow:18px 28px 50px rgba(0,0,0,.6);
    outline:none;
  }
  .book:focus-visible{outline:none;}
  .book .label{font-size:13px;font-weight:700;color:var(--brass);line-height:1.35;margin-top:4px;}
  .book .pages{font-size:11.5px;color:var(--brass-deep);}

  .lib-foot{margin-top:34px;font-size:12.5px;color:var(--brass-deep);opacity:.75;}

  /* ===== Viewer ===== */
  .viewer{
    position:fixed;inset:0;z-index:100;display:none;
    flex-direction:column;
    background:radial-gradient(900px 500px at 50% 0%, #16201a 0%, #080a08 70%);
  }
  .viewer.open{display:flex;}
  .v-top{
    display:flex;align-items:center;gap:12px;
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  }
  .v-back{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(234,201,150,.12);border:1px solid rgba(234,201,150,.3);
    color:var(--brass);font-size:14px;font-weight:700;
    padding:9px 14px;border-radius:11px;cursor:pointer;
  }
  .v-back:active{transform:scale(.97);}
  .v-name{font-size:14.5px;font-weight:800;color:#fff;flex:1;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .v-count{font-size:13px;color:var(--brass-deep);font-variant-numeric:tabular-nums;min-width:46px;text-align:right;}

  .stage{
    flex:1;position:relative;display:flex;align-items:center;justify-content:center;
    padding:6px 8px 0;overflow:hidden;touch-action:pan-y;
  }
  .page-img{
    max-width:100%;max-height:100%;border-radius:8px;
    box-shadow:0 14px 40px rgba(0,0,0,.55);
    border:1px solid rgba(234,201,150,.18);
    background:#fff;user-select:none;-webkit-user-drag:none;
    transition:opacity .18s ease;
  }
  .arrow{
    position:absolute;top:50%;transform:translateY(-50%);
    width:46px;height:46px;border-radius:50%;
    background:rgba(20,28,22,.72);border:1px solid rgba(234,201,150,.32);
    color:var(--brass);display:grid;place-items:center;cursor:pointer;
    font-size:22px;line-height:1;backdrop-filter:blur(4px);z-index:2;
  }
  .arrow:active{transform:translateY(-50%) scale(.92);}
  .arrow.left{left:10px;}
  .arrow.right{right:10px;}
  .arrow[disabled]{opacity:.25;pointer-events:none;}

  /* dots */
  .v-dots{
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    padding:12px 16px 6px;max-height:64px;overflow-y:auto;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(234,201,150,.28);
    cursor:pointer;flex:0 0 auto;transition:background .15s,transform .15s;}
  .dot.on{background:var(--brass);transform:scale(1.35);}

  /* sticky kakao */
  .kbar{
    padding:8px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .kbar a{
    display:flex;align-items:center;justify-content:center;gap:9px;
    width:100%;max-width:560px;margin:0 auto;padding:15px;border-radius:14px;
    background:var(--kakao);color:var(--kakao-ink);
    font-size:16px;font-weight:800;text-decoration:none;
    box-shadow:0 8px 24px rgba(254,229,0,.35);
  }
  .kbar a:active{transform:translateY(2px);}

  /* library-level kakao (fixed) */
  .lib-kbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    padding:12px 18px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(10,13,11,0),rgba(10,13,11,.95) 35%);
  }
  .lib-kbar a{
    display:flex;align-items:center;justify-content:center;gap:10px;
    max-width:560px;margin:0 auto;padding:15px;border-radius:15px;
    background:var(--kakao);color:var(--kakao-ink);
    font-size:16px;font-weight:800;text-decoration:none;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }

  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  /* 인쇄/PDF 저장 차단 */
  @media print{
    body *{display:none!important;}
    body::after{content:"인쇄 및 저장이 제한된 자료입니다.";display:block!important;
      font-size:18px;color:#000;text-align:center;padding:40px;}
  }
  /* 이미지 드래그/선택 방지 */
  img{-webkit-user-drag:none;user-select:none;-webkit-user-select:none;}
  .book,.book *{user-select:none;-webkit-user-select:none;}
</style>
</head>
<body>

  <!-- ===== LIBRARY ===== -->
  <main class="lib" id="lib">
    <div class="lib-brand">지필드 영재교육</div>
    <h1 class="lib-title">학습 <b>미리보기</b></h1>
    <p class="lib-sub">표지를 눌러 한 장씩 넘겨보세요.</p>

    <div class="shelf" id="shelf"><!-- books injected --></div>

    <p class="lib-foot">© 지필드 영재교육 · 무단 복제 및 배포를 금합니다.</p>
  </main>

  <div class="lib-kbar" id="libKbar">
    <a href="https://naver.me/5YoqcLz7" target="_blank" rel="noopener">📝 상담 신청하기</a>
  </div>

  <!-- ===== VIEWER ===== -->
  <section class="viewer" id="viewer" aria-hidden="true">
    <div class="v-top">
      <button class="v-back" id="back">‹ 서재</button>
      <div class="v-name" id="vName"></div>
      <div class="v-count" id="vCount"></div>
    </div>
    <div class="stage" id="stage">
      <button class="arrow left" id="prev" aria-label="이전 페이지">‹</button>
      <img class="page-img" id="pageImg" alt="교재 페이지" draggable="false">
      <button class="arrow right" id="next" aria-label="다음 페이지">›</button>
    </div>
    <div class="v-dots" id="dots"></div>
    <div class="kbar">
      <a href="https://naver.me/5YoqcLz7" target="_blank" rel="noopener">📝 상담 신청하기</a>
    </div>
  </section>

<script>
  // === Book data ===
  const BOOKS = [
    { id:'5moi',    dir:'5moi',    name:'탄탄모의고사', count:7,  ext:'jpg' },
    { id:'mission', dir:'mission', name:'키즈팩토 MISSION', count:16, ext:'jpg' },
    { id:'basic',   dir:'basic',   name:'G-MATH BASIC 1',              count:19, ext:'jpg' },
    { id:'groot',   dir:'groot',   name:'G-ROOT 상(上)', count:17, ext:'jpg' },
    { id:'sooyeon', dir:'sooyeon', name:'NUMBERS OF MAGIC', count:8, ext:'jpg' },
    { id:'rootpo',  dir:'rootpo',  name:'G-ROOT 표현편',              count:11, ext:'jpg' },
  ];
  const pad = n => String(n).padStart(2,'0');
  const src = (b,i) => `${b.dir}/p-${pad(i)}.${b.ext}`;

  // === Build shelf ===
  const shelf = document.getElementById('shelf');
  BOOKS.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='book';
    btn.innerHTML=`
      <span class="cover"><img loading="lazy" src="${src(b,1)}" alt="${b.name} 표지"></span>
      <span class="label">${b.name}</span>
      <span class="pages">${b.count}쪽 미리보기</span>`;
    btn.addEventListener('click',()=>openBook(b));
    shelf.appendChild(btn);
  });

  // === Viewer state ===
  const viewer=document.getElementById('viewer');
  const lib=document.getElementById('lib');
  const libKbar=document.getElementById('libKbar');
  const pageImg=document.getElementById('pageImg');
  const vName=document.getElementById('vName');
  const vCount=document.getElementById('vCount');
  const dotsBox=document.getElementById('dots');
  const prevBtn=document.getElementById('prev');
  const nextBtn=document.getElementById('next');
  let cur=null, idx=1;

  function openBook(b){
    cur=b; idx=1;
    vName.textContent=b.name;
    // preload neighbors
    buildDots();
    render();
    viewer.classList.add('open');
    viewer.setAttribute('aria-hidden','false');
    lib.style.display='none';
    libKbar.style.display='none';
    window.scrollTo(0,0);
  }
  function closeBook(){
    viewer.classList.remove('open');
    viewer.setAttribute('aria-hidden','true');
    lib.style.display='';
    libKbar.style.display='';
  }
  function buildDots(){
    dotsBox.innerHTML='';
    for(let i=1;i<=cur.count;i++){
      const d=document.createElement('span');
      d.className='dot'+(i===idx?' on':'');
      d.addEventListener('click',()=>{idx=i;render();});
      dotsBox.appendChild(d);
    }
  }
  function render(){
    pageImg.style.opacity='0';
    const im=new Image();
    im.onload=()=>{pageImg.src=im.src;pageImg.style.opacity='1';};
    im.src=src(cur,idx);
    vCount.textContent=`${idx} / ${cur.count}`;
    prevBtn.disabled=idx<=1;
    nextBtn.disabled=idx>=cur.count;
    [...dotsBox.children].forEach((d,i)=>d.classList.toggle('on',i+1===idx));
    // preload next
    if(idx<cur.count){const n=new Image();n.src=src(cur,idx+1);}
  }
  function go(d){
    const ni=idx+d;
    if(ni>=1&&ni<=cur.count){idx=ni;render();}
  }

  document.getElementById('back').addEventListener('click',closeBook);
  prevBtn.addEventListener('click',()=>go(-1));
  nextBtn.addEventListener('click',()=>go(1));

  // keyboard
  document.addEventListener('keydown',e=>{
    if(!viewer.classList.contains('open'))return;
    if(e.key==='ArrowLeft')go(-1);
    else if(e.key==='ArrowRight')go(1);
    else if(e.key==='Escape')closeBook();
  });

  // swipe
  const stage=document.getElementById('stage');
  let sx=0,sy=0,sw=false;
  stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=true;},{passive:true});
  stage.addEventListener('touchend',e=>{
    if(!sw)return;sw=false;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)) go(dx<0?1:-1);
  },{passive:true});

  /* ===== 보호: 우클릭·개발자도구·인쇄·드래그 차단 ===== */
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('dragstart',e=>e.preventDefault());
  document.addEventListener('selectstart',e=>e.preventDefault());
  document.addEventListener('keydown',e=>{
    const k=(e.key||'').toLowerCase();
    // F12
    if(e.key==='F12'){e.preventDefault();return false;}
    // Ctrl/Cmd+Shift+I/J/C (개발자도구), Ctrl/Cmd+U (소스), Ctrl/Cmd+S/P (저장/인쇄)
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return false;}
    if((e.ctrlKey||e.metaKey)&&['u','s','p'].includes(k)){e.preventDefault();return false;}
  });
</script>
</body>
</html>
